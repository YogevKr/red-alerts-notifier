services:
  canary-poller:
    build: ./poller
    restart: unless-stopped
    ports:
      - target: 3000
        published: "${POLLER_PUBLISHED_PORT:-3302}"
        host_ip: "${POLLER_HOST_IP:-127.0.0.1}"
    environment:
      - EVOLUTION_URL=${EVOLUTION_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-default}
      - EVOLUTION_FALLBACK_INSTANCE=${EVOLUTION_FALLBACK_INSTANCE:-}
      - WHATSAPP_TARGETS=${WHATSAPP_TARGETS}
      - WHATSAPP_NUMBER=${WHATSAPP_NUMBER:-}
      - WHATSAPP_CHAT_ID=${WHATSAPP_CHAT_ID:-}
      - TEST_NOTIFICATION_TARGETS=${TEST_NOTIFICATION_TARGETS:-}
      - NOTIFIER_ACTIVE_TRANSPORTS=${NOTIFIER_ACTIVE_TRANSPORTS:-whatsapp,telegram}
      - ACTIVE_SOURCES=${ACTIVE_SOURCES:-oref_alerts,oref_history,oref_mqtt,tzevaadom}
      - OREF_MQTT_ENABLED=${OREF_MQTT_ENABLED:-true}
      - OREF_MQTT_RECONNECT_MS=${OREF_MQTT_RECONNECT_MS:-5000}
      - OREF_MQTT_TOPICS=${OREF_MQTT_TOPICS:-com.alert.meserhadash}
      - OREF_MQTT_RAW_LOG_ENABLED=${OREF_MQTT_RAW_LOG_ENABLED:-false}
      - OREF_MQTT_RAW_LOG_MAX_ENTRIES=${OREF_MQTT_RAW_LOG_MAX_ENTRIES:-500}
      - TZEVAADOM_ENABLED=${TZEVAADOM_ENABLED:-true}
      - TZEVAADOM_RECONNECT_MS=${TZEVAADOM_RECONNECT_MS:-5000}
      - TZEVAADOM_RAW_LOG_ENABLED=${TZEVAADOM_RAW_LOG_ENABLED:-false}
      - TZEVAADOM_RAW_LOG_MAX_ENTRIES=${TZEVAADOM_RAW_LOG_MAX_ENTRIES:-500}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_SUPPRESSION_INTERVAL_MS=${LOG_SUPPRESSION_INTERVAL_MS:-60000}
      - DELIVERY_ENABLED=${DELIVERY_ENABLED:-true}
      - ALERT_SINKS=${ALERT_SINKS:-notification_outbox}
      - DEBUG_CAPTURE_ENABLED=${DEBUG_CAPTURE_ENABLED:-false}
      - DEBUG_CAPTURE_TTL_HOURS=${DEBUG_CAPTURE_TTL_HOURS:-0}
      - DEBUG_CAPTURE_MAX_ENTRIES=${DEBUG_CAPTURE_MAX_ENTRIES:-50000}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY:-}
      - PAGERDUTY_EVENTS_URL=${PAGERDUTY_EVENTS_URL:-https://events.pagerduty.com/v2/enqueue}
      - PAGERDUTY_SOURCE=${PAGERDUTY_SOURCE:-red-alerts/poller}
      - PAGERDUTY_COMPONENT=${PAGERDUTY_COMPONENT:-poller}
      - PAGERDUTY_GROUP=${PAGERDUTY_GROUP:-red-alerts}
      - PAGERDUTY_CLASS=${PAGERDUTY_CLASS:-ops}
      - PAGERDUTY_WHATSAPP_DISCONNECT_MS=${PAGERDUTY_WHATSAPP_DISCONNECT_MS:-120000}
      - PAGERDUTY_SOURCE_FAILURE_CYCLES=${PAGERDUTY_SOURCE_FAILURE_CYCLES:-6}
      - PAGERDUTY_POLL_ERROR_CYCLES=${PAGERDUTY_POLL_ERROR_CYCLES:-3}
      - PAGERDUTY_DB_DISCONNECT_MS=${PAGERDUTY_DB_DISCONNECT_MS:-30000}
      - PAGERDUTY_OUTBOX_BACKLOG_MS=${PAGERDUTY_OUTBOX_BACKLOG_MS:-60000}
      - PAGERDUTY_NOTIFIER_STALE_MS=${PAGERDUTY_NOTIFIER_STALE_MS:-45000}
      - PAGERDUTY_TZEVAADOM_DISCONNECT_MS=${PAGERDUTY_TZEVAADOM_DISCONNECT_MS:-300000}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-10000}
      - OREF_ALERTS_POLL_INTERVAL_MS=${OREF_ALERTS_POLL_INTERVAL_MS:-1000}
      - OREF_HISTORY_POLL_INTERVAL_MS=${OREF_HISTORY_POLL_INTERVAL_MS:-5000}
      - POLLER_DATABASE_URL=${POLLER_DATABASE_URL}
      - POLLER_DATABASE_SCHEMA=${POLLER_DATABASE_SCHEMA:-poller_canary}
      - SOURCE_EVENT_LEDGER_ENABLED=${SOURCE_EVENT_LEDGER_ENABLED:-true}
      - ALERT_LOCATIONS=${ALERT_LOCATIONS}
    volumes:
      - poller_canary_state:/app/data
    networks:
      - shared

  canary-notifier-worker:
    build: ./poller
    command: ["node", "notifier-worker.js"]
    restart: unless-stopped
    environment:
      - EVOLUTION_URL=${EVOLUTION_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-default}
      - EVOLUTION_FALLBACK_INSTANCE=${EVOLUTION_FALLBACK_INSTANCE:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - POLLER_DATABASE_URL=${POLLER_DATABASE_URL}
      - POLLER_DATABASE_SCHEMA=${POLLER_DATABASE_SCHEMA:-poller_canary}
      - OUTBOX_POLL_INTERVAL_MS=${OUTBOX_POLL_INTERVAL_MS:-1000}
      - OUTBOX_RESERVE_BATCH=${OUTBOX_RESERVE_BATCH:-5}
      - OUTBOX_MAX_CONCURRENCY=${OUTBOX_MAX_CONCURRENCY:-}
      - OUTBOX_RETRY_BASE_MS=${OUTBOX_RETRY_BASE_MS:-15000}
      - OUTBOX_MAX_ATTEMPTS=${OUTBOX_MAX_ATTEMPTS:-8}
      - OUTBOX_PROCESSING_TIMEOUT_MS=${OUTBOX_PROCESSING_TIMEOUT_MS:-30000}
      - OUTBOX_STATUS_REFRESH_MS=${OUTBOX_STATUS_REFRESH_MS:-15000}
      - OUTBOX_NOTIFY_RECONNECT_DELAY_MS=${OUTBOX_NOTIFY_RECONNECT_DELAY_MS:-5000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_SUPPRESSION_INTERVAL_MS=${LOG_SUPPRESSION_INTERVAL_MS:-60000}
      - NOTIFIER_ACTIVE_TRANSPORTS=${NOTIFIER_ACTIVE_TRANSPORTS:-whatsapp,telegram}
      - NOTIFIER_WORKER_ID=${NOTIFIER_WORKER_ID:-gcp-canary}
    volumes:
      - poller_canary_state:/app/data
    networks:
      - shared

  canary-telegram-bot:
    build: ./poller
    command: ["node", "telegram-bot.js"]
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_IDS=${TELEGRAM_ALLOWED_USER_IDS}
      - TELEGRAM_POLL_TIMEOUT_SECONDS=${TELEGRAM_POLL_TIMEOUT_SECONDS:-50}
      - TELEGRAM_POLL_RETRY_MS=${TELEGRAM_POLL_RETRY_MS:-5000}
      - POLLER_INTERNAL_URL=${POLLER_INTERNAL_URL:-http://canary-poller:3000}
    volumes:
      - telegram_bot_canary_state:/app/data
    depends_on:
      - canary-poller
    networks:
      - shared

volumes:
  poller_canary_state:
  telegram_bot_canary_state:

networks:
  shared:
    external: true
    name: ${SHARED_DOCKER_NETWORK:-red-alerts_default}
